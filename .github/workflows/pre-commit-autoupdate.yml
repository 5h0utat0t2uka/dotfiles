name: pre-commit-autoupdate

on:
  workflow_dispatch:
  schedule:
    # 日曜日 JST AM 04:00
    - cron: "0 19 * * 6"

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Update pre-commit hooks
        run: pipx run pre-commit autoupdate --freeze

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          assignees: 5h0utat0t2uka
          commit-message: "chore(pre-commit): autoupdate hooks"
          title: "chore(pre-commit): autoupdate hooks"
          body: |
            Automated weekly .pre-commit-config.yaml dependencies update.

          branch: "chore/pre-commit-autoupdate"
          base: main
          delete-branch: true
          add-paths: |
            .pre-commit-config.yaml
          labels: |
            dependencies
            pre-commit
