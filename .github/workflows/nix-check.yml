name: nix-check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'nix/**'
      - '.github/workflows/nix-check.yml'
  push:
    branches: [main]
    paths:
      # - 'nix/**'
      - '.github/workflows/nix-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: Nix Flake Check
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        !startsWith(github.event.head_commit.message, 'Merge pull request ')
      )
    runs-on: macos-26
    permissions:
      contents: read # actions/checkout

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2
        with:
          kvm: false

      - name: Use Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: 5h0uta
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix --version

      - name: flake check
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          nix flake check

      - name: eval each darwin host
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          for h in hosts/darwin/*; do
            [[ -d "$h" ]] || continue
            hn="$(basename "$h")"
            echo "==> evaluating $hn"
            nix eval ".#darwinConfigurations.${hn}.config.system.build.toplevel" >/dev/null
          done
