name: nix-update-check

on:
  workflow_dispatch:
  schedule:
    # 月/水/金 # JST AM 04:00
    - cron: '0 19 * * 0,2,4'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  update-check:
    name: Nix Flake Full Update Check
    runs-on: macos-26
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
        with:
          kvm: false

      - name: Use Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: 5h0uta
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - run: nix --version

      - name: update all inputs
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          nix flake update

      - name: check flake.lock diff
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No flake.lock changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff -- flake.lock
          fi

      - name: flake check after full update
        if: steps.lockfile.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          nix flake check

      - name: eval each darwin host after full update
        if: steps.lockfile.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          for h in hosts/darwin/*; do
            [[ -d "$h" ]] || continue
            hn="$(basename "$h")"
            echo "==> evaluating $hn"
            nix eval ".#darwinConfigurations.${hn}.config.system.build.toplevel" >/dev/null
          done

      - name: build each darwin host after full update
        if: steps.lockfile.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd nix
          for h in hosts/darwin/*; do
            [[ -d "$h" ]] || continue
            hn="$(basename "$h")"
            echo "==> building $hn"
            nix build -L ".#darwinConfigurations.${hn}.system" --no-link
          done

      - name: create pull request
        if: steps.lockfile.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          assignees: 5h0utat0t2uka
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          body: |
            Automated weekly full input update.
            This PR was created only after:
            - nix flake update
            - nix flake check
            - eval each darwin host
            - build each darwin host

          branch: chore/nix-update-flake-lock
          base: main
          delete-branch: true
          add-paths: |
            nix/flake.lock
          labels: |
            dependencies
            nix
